<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/VideoPoster/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Poster</title>
  <script type="module" crossorigin src="/VideoPoster/script.js"></script>
  <link rel="stylesheet" crossorigin href="/VideoPoster/style.css">
</head>

<body>
  <div id="app">
    <div class="video-poster-block">
      <div class="video-wrap">
        <section class="video-group">
          <h2>YouTube</h2>
          <div class="video-grid">
            <div class="video-shell" data-video-type="youtube" data-video-url="https://www.youtube.com/watch?v=k7dy1B6bOeM"></div>
            <div class="video-shell" data-video-type="youtube" data-video-url="https://www.youtube.com/watch?v=sRWcJrMTtMI"></div>
          </div>
        </section>

        <section class="video-group">
          <h2>Vimeo</h2>
          <div class="video-grid">
            <div class="video-shell" data-video-type="vimeo" data-video-url="https://vimeo.com/294651511"></div>
            <div class="video-shell" data-video-type="vimeo" data-video-url="https://vimeo.com/89009039"></div>
          </div>
        </section>

        <section class="video-group">
          <h2>HTML5</h2>
          <div class="video-grid">
            <div class="video-shell" data-video-type="html5" data-video-url="https://www.pexels.com/download/video/1851768/"
              data-poster-url="https://images.pexels.com/videos/5901174/pexels-photo-5901174.jpeg?auto=compress&cs=tinysrgb&w=600&loading=lazy"></div>
            <div class="video-shell" data-video-type="html5" data-video-url="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"
              data-poster-url="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?auto=format&fit=crop&w=640&q=80"></div>
          </div>
        </section>
      </div>
    </div>
  </div>
</body>

</html>
