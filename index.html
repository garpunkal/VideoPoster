<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/VideoPoster/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Poster</title>
  <script type="module" crossorigin src="/VideoPoster/script.js"></script>
  <link rel="stylesheet" crossorigin href="/VideoPoster/style.css">
</head>

<body>
  <div id="app">
    <div class="video-poster-block">
      <div class="video-wrap">

        <h2>YouTube</h2>
        <div class="video-shell" data-video-type="youtube" data-video-url="https://www.youtube.com/watch?v=aqz-KE-bpKQ">
        </div>

        <h2>Vimeo</h2>
        <div class="video-shell" data-video-type="vimeo" data-video-url="https://vimeo.com/76979871"></div>

        <h2>HTML5</h2>
        <div class="video-shell" data-video-type="html5" data-video-url="https://www.w3schools.com/html/mov_bbb.mp4"
          data-poster-url="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=640&q=80">
        </div>
      </div>
    </div>
    <p style="text-align:center; margin: 20px 0 28px;">
      <a href="https://github.com/garpunkal/VideoPoster" target="_blank" rel="noopener noreferrer">View repository on GitHub</a>
    </p>
  </div>
</body>

</html>
