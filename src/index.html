<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="garpunkal" />
  <link rel="canonical" href="https://garpunkal.github.io/VideoPoster/" />
  <link rel="stylesheet" href="./src/styles/style.css" />
  <title>Video Poster by garpunkal</title>
  <style type="text/css">
    #app {
  width: 1126px;
  max-width: 100%;
  margin: 0 auto;
  text-align: center;
  border-inline: 1px solid var(--border);
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  box-sizing: border-box;
}

  </style>
</head>

<body>
  <div id="app">
    <div class="vp-container">

      <h2>YouTube</h2>
      <div data-video-with-poster data-video-url="https://www.youtube.com/watch?v=k7dy1B6bOeM" data-width="640" data-height="360">
      </div>
      <br><br>
      <div data-video-with-poster data-video-url="https://www.youtube.com/watch?v=sRWcJrMTtMI">
      </div>

      <h2>Vimeo</h2>
      <div data-video-with-poster data-video-url="https://vimeo.com/294651511">
      </div>  <br><br>
      <div data-video-with-poster data-video-url="https://vimeo.com/89009039">
      </div>

      <h2>HTML5</h2>

      <div data-video-with-poster data-video-url="https://www.pexels.com/download/video/1851768/"
        data-poster-url="https://images.pexels.com/videos/5901174/pexels-photo-5901174.jpeg?auto=compress&cs=tinysrgb&w=600&loading=lazy">
      </div>  <br><br>
      <div data-video-with-poster
        data-video-url="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"
        data-poster-url="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?auto=format&fit=crop&w=640&q=80">
      </div>
    </div>
  </div>
  
  <script type="module" src="./src/scripts/main.js"></script>
</body>

</html>
